<svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="12">
  <!-- Background -->
  <rect width="860" height="520" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">AWS FinOps Cost Optimization Platform</text>

  <!-- ── EventBridge (Schedulers) ── -->
  <rect x="30" y="60" width="180" height="150" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5" rx="6"/>
  <text x="120" y="78" text-anchor="middle" font-weight="bold" fill="#f57f17">EventBridge</text>
  <text x="120" y="92" text-anchor="middle" font-size="10" fill="#777">Scheduled Rules</text>

  <rect x="44" y="100" width="152" height="28" fill="#fffde7" stroke="#f9a825" stroke-width="1" rx="4"/>
  <text x="120" y="119" text-anchor="middle" fill="#333">Daily (cost report)</text>

  <rect x="44" y="136" width="152" height="28" fill="#fffde7" stroke="#f9a825" stroke-width="1" rx="4"/>
  <text x="120" y="155" text-anchor="middle" fill="#333">Hourly (anomaly check)</text>

  <rect x="44" y="172" width="152" height="28" fill="#fffde7" stroke="#f9a825" stroke-width="1" rx="4"/>
  <text x="120" y="191" text-anchor="middle" fill="#333">Weekly (optimization)</text>

  <!-- ── Lambda Functions ── -->
  <rect x="280" y="60" width="300" height="390" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" rx="6"/>
  <text x="430" y="78" text-anchor="middle" font-weight="bold" fill="#1b5e20">Lambda Functions</text>

  <!-- cost_reporter -->
  <rect x="296" y="90" width="268" height="100" fill="#f1f8e9" stroke="#558b2f" stroke-width="1" rx="4"/>
  <text x="430" y="108" text-anchor="middle" font-weight="bold" fill="#33691e">cost_reporter</text>
  <text x="430" y="124" text-anchor="middle" font-size="10" fill="#555">Fetches daily + MTD spend</text>
  <text x="430" y="139" text-anchor="middle" font-size="10" fill="#555">Calculates budget % utilisation</text>
  <text x="430" y="154" text-anchor="middle" font-size="10" fill="#555">Publishes report to SNS</text>
  <text x="430" y="169" text-anchor="middle" font-size="10" fill="#888">CloudWatch Logs  |  KMS encrypted</text>

  <!-- anomaly_detector -->
  <rect x="296" y="202" width="268" height="100" fill="#f1f8e9" stroke="#558b2f" stroke-width="1" rx="4"/>
  <text x="430" y="220" text-anchor="middle" font-weight="bold" fill="#33691e">anomaly_detector</text>
  <text x="430" y="236" text-anchor="middle" font-size="10" fill="#555">Compares current vs previous spend</text>
  <text x="430" y="251" text-anchor="middle" font-size="10" fill="#555">Alerts when threshold exceeded</text>
  <text x="430" y="266" text-anchor="middle" font-size="10" fill="#555">Per-service + overall anomaly detection</text>
  <text x="430" y="281" text-anchor="middle" font-size="10" fill="#888">CloudWatch Logs  |  KMS encrypted</text>

  <!-- resource_optimizer -->
  <rect x="296" y="314" width="268" height="100" fill="#f1f8e9" stroke="#558b2f" stroke-width="1" rx="4"/>
  <text x="430" y="332" text-anchor="middle" font-weight="bold" fill="#33691e">resource_optimizer</text>
  <text x="430" y="348" text-anchor="middle" font-size="10" fill="#555">Scans unattached EBS volumes</text>
  <text x="430" y="363" text-anchor="middle" font-size="10" fill="#555">Detects idle EC2 + old snapshots</text>
  <text x="430" y="378" text-anchor="middle" font-size="10" fill="#555">Estimates monthly savings</text>
  <text x="430" y="393" text-anchor="middle" font-size="10" fill="#888">CloudWatch Logs  |  KMS encrypted</text>

  <!-- IAM roles label -->
  <text x="430" y="432" text-anchor="middle" font-size="10" fill="#2e7d32">Least-privilege IAM role per function</text>
  <text x="430" y="446" text-anchor="middle" font-size="10" fill="#2e7d32">SQS Dead-Letter Queue on EventBridge</text>

  <!-- ── AWS Cost Explorer ── -->
  <rect x="660" y="155" width="170" height="50" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" rx="6"/>
  <text x="745" y="177" text-anchor="middle" font-weight="bold" fill="#0d47a1">AWS Cost Explorer</text>
  <text x="745" y="193" text-anchor="middle" font-size="10" fill="#555">Read-only billing API</text>

  <!-- ── SNS ── -->
  <rect x="660" y="250" width="170" height="70" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" rx="6"/>
  <text x="745" y="271" text-anchor="middle" font-weight="bold" fill="#b71c1c">SNS Topic</text>
  <text x="745" y="287" text-anchor="middle" font-size="10" fill="#555">cost-alerts</text>
  <text x="745" y="302" text-anchor="middle" font-size="10" fill="#555">Email subscription</text>

  <!-- ── AWS Budgets ── -->
  <rect x="660" y="365" width="170" height="50" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" rx="6"/>
  <text x="745" y="387" text-anchor="middle" font-weight="bold" fill="#4a148c">AWS Budgets</text>
  <text x="745" y="402" text-anchor="middle" font-size="10" fill="#555">Monthly budget alert</text>

  <!-- ── KMS ── -->
  <rect x="340" y="460" width="180" height="44" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" rx="6"/>
  <text x="430" y="479" text-anchor="middle" font-weight="bold" fill="#bf360c">KMS</text>
  <text x="430" y="495" text-anchor="middle" font-size="10" fill="#555">Encrypts logs + SNS + SQS</text>

  <!-- ── Arrows ── -->
  <!-- EventBridge → Lambda (daily) -->
  <line x1="210" y1="114" x2="296" y2="135" stroke="#f9a825" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <!-- EventBridge → Lambda (hourly) -->
  <line x1="210" y1="150" x2="296" y2="250" stroke="#f9a825" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <!-- EventBridge → Lambda (weekly) -->
  <line x1="210" y1="186" x2="296" y2="362" stroke="#f9a825" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Lambda → Cost Explorer -->
  <line x1="564" y1="140" x2="658" y2="175" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="564" y1="252" x2="658" y2="192" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Lambda → SNS -->
  <line x1="564" y1="160" x2="658" y2="268" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="564" y1="262" x2="658" y2="275" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="564" y1="370" x2="658" y2="296" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Lambda → KMS (upward from bottom) -->
  <line x1="430" y1="450" x2="430" y2="460" stroke="#e65100" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- Budgets → SNS -->
  <line x1="745" y1="365" x2="745" y2="322" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f9a825"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1565c0"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c62828"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e65100"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6a1b9a"/>
    </marker>
  </defs>
</svg>
