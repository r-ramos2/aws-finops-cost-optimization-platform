name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-flight runs for the same branch/PR so stale jobs don't waste
# runner minutes or produce misleading status checks.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.0

      - uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Run unit tests
        run: pytest -q

  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v6.0.0

      - uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.5.7

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  # Static IaC security scan with Checkov.
  #
  # Runs in hard-fail mode. Only intentional trade-offs are skipped,
  # each with an explicit rationale below. Any other HIGH/CRITICAL finding
  # will break the build.
  #
  # Skipped checks and rationale:
  #   CKV_AWS_117  -- Lambda not in VPC: these functions call AWS service
  #                   APIs (Cost Explorer, EC2, SNS) that are reachable over
  #                   the public endpoint. Adding a VPC + NAT Gateway would
  #                   increase cost and complexity with no security benefit
  #                   for a single-account serverless FinOps tool.
  #   CKV_AWS_50   -- Lambda X-Ray tracing disabled: CloudWatch Logs +
  #                   metric alarms already provide sufficient observability
  #                   for a scheduled homelab workload. X-Ray adds per-trace
  #                   cost with no meaningful gain here.
  #   CKV_AWS_272  -- Lambda reserved concurrency not set: all three
  #                   functions are scheduled (EventBridge cron/rate), not
  #                   traffic-driven. Concurrency spikes are not a concern.
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.0

      - uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Checkov
        run: pip install -r requirements-dev.txt

      - name: Checkov scan (Terraform)
        run: |
          checkov \
            --directory terraform \
            --framework terraform \
            --output cli \
            --compact \
            --skip-check CKV_AWS_117,CKV_AWS_50,CKV_AWS_272
