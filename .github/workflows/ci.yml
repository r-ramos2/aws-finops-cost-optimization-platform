name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Opt into Node.js 24 now to silence the Node.js 20 deprecation warning on
# hashicorp/setup-terraform@v3.x, which has no v4 release yet. GitHub forces
# Node.js 24 on all runners from 2026-06-02 regardless.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Cancel in-flight runs for the same branch/PR so stale jobs don't waste
# runner minutes or produce misleading status checks.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.0

      - uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Run unit tests
        run: pytest -q

  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v6.0.0

      - uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.5.7

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  # Static IaC security scan with Checkov.
  #
  # Runs in hard-fail mode. Only intentional trade-offs are skipped,
  # each with an explicit rationale below. Any other HIGH/CRITICAL finding
  # will break the build.
  #
  # Skipped checks and rationale:
  #   CKV_AWS_117  -- Lambda not in VPC: these functions call AWS service
  #                   APIs (Cost Explorer, EC2, SNS) that are reachable over
  #                   the public endpoint. Adding a VPC + NAT Gateway would
  #                   increase cost and complexity with no security benefit
  #                   for a single-account serverless FinOps tool.
  #   CKV_AWS_50   -- Lambda X-Ray tracing disabled: CloudWatch Logs +
  #                   metric alarms already provide sufficient observability
  #                   for a scheduled homelab workload. X-Ray adds per-trace
  #                   cost with no meaningful gain here.
  #   CKV_AWS_272  -- Lambda reserved concurrency not set: covered by the
  #                   same rationale as CKV_AWS_115 below.
  #   CKV_AWS_115  -- Lambda function-level concurrency limit not set: all
  #                   three functions are scheduled (EventBridge cron/rate),
  #                   not traffic-driven. Concurrency spikes are not a concern.
  #   CKV_AWS_338  -- CloudWatch log retention < 1 year: 14-day retention is
  #                   intentional for a homelab to avoid log storage cost.
  #                   Adjust var.log_retention_days before using in production.
  #   CKV_AWS_111  -- IAM policy allows write without resource constraint: the
  #   CKV_AWS_356     KMS root key policy must grant kms:* to the account root
  #   CKV_AWS_109     principal with Resource: "*" — this is the AWS-required
  #                   pattern for KMS key administration and cannot be scoped
  #                   further. All other IAM policies in this project are
  #                   fully resource-scoped.
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.0

      - uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Checkov
        run: pip install -r requirements-dev.txt

      - name: Checkov scan (Terraform)
        run: |
          checkov \
            --directory terraform \
            --framework terraform \
            --output cli \
            --compact \
            --skip-check CKV_AWS_117,CKV_AWS_50,CKV_AWS_272,CKV_AWS_115,CKV_AWS_338,CKV_AWS_111,CKV_AWS_356,CKV_AWS_109
